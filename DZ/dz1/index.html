<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Гловна сторінка</title>
</head>
<body>
<h1>№1</h1>
<script>
  name = prompt("Як вас звати?");
  document.writeln("Як вас звати?"+ name);
  document.writeln("Привіт, "+ name);
</script>
<h1>№2</h1>
<script>
  year = prompt("Коли ви народилися?"+ year);
  now = 2026;
  yearsOld = now - year;
  document.writeln("Коли ви народилися?");
  document.writeln("Вам " + yearsOld + " років");
</script>
<h1>№3</h1>
<script>
    a = prompt("Яка довжина у вашого квадрата?");
    P = a * 4;
    document.writeln("Яка довжина у вашого квадрата?"+ a);
    document.writeln("У вашого квадрата периметр " + P + " см");
</script>
<h1>№4</h1>
<script>
    r = prompt("Напишіть радіус вашого кола: ");
    S = 3.14 * (r * r);
    document.writeln("Напишіть радіус вашого кола: "+ r);
    document.writeln("Площа кола: "+ S);
</script>
<h1>№5</h1>
<script>
    s = prompt("Напишіть відстань між вашим містом та бажаним: ");
    t = prompt("Напишіть за який час ви би хотіли подолати відстань: ");
    v = s / t;
    document.writeln("Напишіть відстань між вашим містом та бажаним: "+ s);
    document.writeln("Напишіть за який час ви би хотіли подолати відстань: "+ t);
    document.writeln("Швидкість з якою ви дістанетесь до бажаного міста: "+ v +"км/год")
</script>

</html>
